<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Poppino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">
      <h2>Login to Poppino</h2>

      <p class="auth-subtext">
        Enter your email to continue
      </p>

      <input
        type="email"
        id="login-email"
        placeholder="Enter your email"
      />
      <p id="login-msg" class="auth-msg"></p>

      <button
        id="login-btn"
        type="button"
        class="btn primary-btn full-btn"
      >
        Login
      </button>

      <p class="auth-footer">
        New here?
        <a href="signup.html">Create an account</a>
      </p>
    </div>
  </div>

  <script src="js/fakeApi.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils/authState.js"></script>
<script src="js/navbar.js"></script>
<script src="js/script.js"></script>

</body>
</html>
