<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Poppino Admin</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-box {
      max-width: 900px;
      margin: 40px auto;
    }
    .admin-section {
      margin-bottom: 40px;
    }
    .admin-section h2 {
      margin-bottom: 10px;
    }
    .admin-card {
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
    }
    select {
      padding: 6px;
    }
  </style>
</head>
<body>

  <div class="admin-box">
    <h1>🛠 Poppino Admin Panel</h1>

    <!-- USERS -->
    <div class="admin-section">
      <h2>All Users</h2>
      <div id="users-list"></div>
    </div>

    <!-- ORDERS -->
    <div class="admin-section">
      <h2>All Orders</h2>
      <div id="orders-list"></div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/utils/authState.js"></script>
<script src="js/navbar.js"></script>
<script src="js/script.js"></script>
</body>
</html>
